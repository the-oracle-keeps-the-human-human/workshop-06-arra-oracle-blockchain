services:
  op-geth:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-geth:v1.101511.1
    container_name: vessel-op-geth
    volumes:
      - ./sequencer:/workspace
      - op_geth_data:/workspace/op-geth-data
    ports:
      - "8545:8545"
      - "8546:8546"
      - "8551:8551"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ ! -d /workspace/op-geth-data/geth/chaindata ]; then
          geth init --datadir=/workspace/op-geth-data --state.scheme=hash /workspace/genesis.json
        fi
        exec geth \
          --datadir=/workspace/op-geth-data \
          --http --http.addr=0.0.0.0 --http.port=8545 \
          --http.api=eth,net,web3,debug,txpool,admin \
          --http.vhosts=* --http.corsdomain=* \
          --ws --ws.addr=0.0.0.0 --ws.port=8546 \
          --ws.api=eth,net,web3,debug,txpool,admin --ws.origins=* \
          --authrpc.addr=0.0.0.0 --authrpc.port=8551 \
          --authrpc.jwtsecret=/workspace/jwt.txt \
          --authrpc.vhosts=* \
          --syncmode=full --gcmode=archive \
          --rollup.disabletxpoolgossip=true

  op-node:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node:v1.13.5
    container_name: vessel-op-node
    volumes:
      - ./sequencer:/workspace
      - op_geth_data:/workspace/op-geth-data
    ports:
      - "8547:8547"
      - "9222:9222"
    command: >
      op-node
      --l1=${L1_RPC_URL}
      --l1.beacon=${L1_BEACON_URL}
      --l2=http://op-geth:8551
      --l2.jwt-secret=/workspace/jwt.txt
      --rollup.config=/workspace/rollup.json
      --sequencer.enabled=true
      --sequencer.stopped=false
      --p2p.disable
      --rpc.addr=0.0.0.0
      --rpc.port=8547
      --rpc.enable-admin
      --log.level=info
    depends_on:
      - op-geth

  otterscan:
    image: otterscan/otterscan:latest
    container_name: vessel-otterscan
    environment:
      - ERIGON_URL=http://op-geth:8545
    ports:
      - "5200:80"
    depends_on:
      - op-geth

volumes:
  op_geth_data:
